{% extends "layout.html" %}

{% set page_title = "Edit Izin" %}

{% block content %}
  <section style="max-width: 640px;">
    <div class="section-header section-header--compact">
      <span class="section-header__label">{{ izin.request_number }}</span>
      <h2>Edit Pengajuan Izin</h2>
      <p>Perubahan hanya bisa dilakukan selama status masih "Diajukan".</p>
    </div>

    <form class="form-panel" method="post" action="{{ url_for('leave_requests.mahasiswa_update', leave_id=izin.id) }}" data-loading>
      <div class="form-group">
        <label for="schedule_id">Jadwal Kelas</label>
        <select id="schedule_id" name="schedule_id" required>
          <option value="">Pilih jadwal kelas</option>
          {% for s in schedules %}
            <option value="{{ s.id }}" {{ "selected" if izin.schedule_id == s.id }}>{{ s.course_name }} — {{ s.class_name }} ({{ s.day }}, {{ s.start_time.strftime('%H:%M') }}–{{ s.end_time.strftime('%H:%M') }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="category_id">Kategori Izin</label>
        <select id="category_id" name="category_id" required>
          <option value="">Pilih kategori</option>
          {% for c in categories %}
            <option value="{{ c.id }}" {{ "selected" if izin.category_id == c.id }}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="permission_date">Tanggal Izin</label>
        <input id="permission_date" name="permission_date" type="date" value="{{ izin.permission_date.isoformat() }}" required>
      </div>

      <div class="form-group">
        <label for="reason">Alasan Izin</label>
        <textarea id="reason" name="reason" rows="4" minlength="10" required>{{ izin.reason }}</textarea>
        <span class="form-hint">Minimal 10 karakter</span>
      </div>

      <div style="display: flex; gap: 10px;">
        <a class="button button--secondary" href="{{ url_for('leave_requests.mahasiswa_detail', leave_id=izin.id) }}">Batal</a>
        <button class="button button--primary" type="submit" style="flex: 1;">Simpan Perubahan</button>
      </div>
    </form>
  </section>
{% endblock %}
