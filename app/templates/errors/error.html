{% extends "layout.html" %}

{% block content %}
  <section class="empty-state empty-state--error">
    <div class="empty-state__icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
    </div>
    <span class="status-badge status-badge--danger">{{ status_code }}</span>
    <h2>{{ title }}</h2>
    <p>{{ message }}</p>
    {% if current_user.is_authenticated %}
      <a class="button button--secondary" href="{{ url_for(current_user.dashboard_endpoint()) }}" style="margin-top: 16px;">Kembali ke Dashboard</a>
    {% else %}
      <a class="button button--secondary" href="{{ url_for('auth.login') }}" style="margin-top: 16px;">Kembali ke Login</a>
    {% endif %}
  </section>
{% endblock %}
